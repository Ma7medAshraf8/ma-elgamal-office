<!doctype html>
<html lang='en' dir='ltr' data-theme='dark'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>M.Elgamal </title><meta name="description" content="M. Elgamal is an architecture and interior design firm serving Cairo, Sadat City, and Monufia.">
    <link rel='stylesheet' href='styles.css'>

<body data-page='index'>
    <main>
        <section class="hero needs-blueprint">
            <div class="hero-content"><img class="hero-logo theme-logo" src="LOGO WIHT.png" alt="M. Elgamal">
                <h1 data-en="M. Elgamal Office" data-ar="مكتب م. الجمال"></h1>
                <div class="tagline" data-en="Architecture. Interior Design. Execution."
                    data-ar="عمارة. تصميم داخلي. تنفيذ."></div>
                <p class="lead"
                    data-en="We design spaces that elevate the way people live and work — for every client, at every budget."
                    data-ar="نصمم فراغات ترفع جودة حياة الإنسان — لكل عميل، وفي كل ميزانية."></p>
                <div class="cta-row"><a class="btn primary" href="projects.html" data-en="Our Projects"
                        data-ar="مشاريعنا"></a><a class="btn secondary" href="contact.html" data-en="Start Your Project"
                        data-ar="ابدأ مشروعك"></a></div>
            </div>
        </section>
        <section class="section">
            <div class="grid cols-3 reveal">
                <article class="service-card"><svg class="service-icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor">
                        <path d="M4 21V5l8-3 8 3v16" />
                        <path d="M9 21v-8h6v8M8 7h.01M12 7h.01M16 7h.01" />
                    </svg>
                    <h3 data-en="Architectural Design" data-ar="التصميم المعماري"></h3>
                </article>
                <article class="service-card"><svg class="service-icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor">
                        <path d="M4 12h16v7H4z" />
                        <path d="M6 12V8a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v4M4 19v2M20 19v2" />
                    </svg>
                    <h3 data-en="Interior Design" data-ar="التصميم الداخلي"></h3>
                </article>
                <article class="service-card"><svg class="service-icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor">
                        <path d="M14 7l3 3M5 19l9-9 3 3-9 9H5z" />

                    </svg>
                    <h3 data-en="Execution & Finishing" data-ar="التنفيذ والتشطيب"></h3>
                </article>
            </div>
        </section>
        <section class="section alt">
            <div class="section-head reveal">
                <div class="eyebrow" data-en="Selected Work" data-ar="من أعمالنا"></div>
                <h2 data-en="Selected Work" data-ar="من أعمالنا"></h2>
            </div>
            <div class="grid cols-2"><a class="project-card reveal" href="project-zahran.html"><img
                        src="zahran project 2024/RECEPTION 00.png" alt="Zahran Apartment">
                    <div class="project-info">
                        <h3>Zahran Apartment</h3>
                        <p>Interior Design & Execution · 2024</p>
                    </div>
                </a><a class="project-card reveal" href="project-safa.html"><img src="khalyt Safa 2025/RECEPTION.jpg"
                        alt="Khalyt Safa">
                    <div class="project-info">
                        <h3>Khalyt Safa 2025</h3>
                        <p>Architecture & Interior Design · 2025</p>
                    </div>
                </a></div>
        </section>
        <section class="section">
            <div class="split reveal">
                <div class="quote" data-en="Well-designed space is not a luxury — it is a right."
                    data-ar="الفراغ المصمم بشكل جيد ليس رفاهية — بل هو حق."></div>
                <div>
                    <h2 data-en="About the Office" data-ar="عن المكتب"></h2>
                    <p class="lead"
                        data-en="M. Elgamal Office was founded in September 2024 on a single conviction: that every person deserves to live and work in an environment that supports them, uplifts them, and helps them fulfill their purpose."
                        data-ar="أُسس مكتب م. الجمال في سبتمبر ٢٠٢٤ على قناعة واحدة: أن كل إنسان يستحق أن يعيش ويعمل في بيئة تدعمه وترفعه وتساعده على أداء دوره.">
                    </p><a class="btn secondary" href="about.html" data-en="About the Office" data-ar="عن المكتب"></a>
                </div>
            </div>

        <section class="section alt">
            <div class="section-head reveal">
                <h2 data-en="Gallery" data-ar="معرض الأعمال"></h2>
            </div>
            <div class="gallery-grid reveal">
                <div class="gallery-item"><img src="Interior designs/bathroom 00.jpeg" alt="Interior design"></div>
                <div class="gallery-item"><img src="Interior designs/Bedroom 00.jpeg" alt="Interior design"></div>
                <div class="gallery-item"><img src="Interior designs/Reception 00.png" alt="Interior design"></div>
            </div>
            <div class="cta-row" style="margin-top:34px"><a class="btn primary" href="gallery.html"

        <section class="section banner">
            <h2 data-en="Ready to start your project? Let's talk." data-ar="مستعد تبدأ مشروعك؟ تكلم معنا."></h2><a
                class="btn primary" href="contact.html" data-en="Start Your Project" data-ar="ابدأ مشروعك"></a>
