<main><section class="page-hero needs-blueprint"><div class="content reveal"><h1 data-en="About the Office" data-ar="عن المكتب"></h1></div></section><section class="section"><div class="body-copy reveal"><p data-en="M. Elgamal Office was founded in September 2024 on a single conviction: that well-designed space is not a luxury — it is a right." data-ar="أُسس مكتب م. الجمال في سبتمبر ٢٠٢٤ على قناعة واحدة: أن الفراغ المصمم بشكل جيد ليس رفاهية — بل هو حق."></p><p data-en="We believe every person, regardless of their economic background, deserves to live and work in an environment that supports them, uplifts them, and helps them fulfill their purpose in life." data-ar="نؤمن بأن كل إنسان، بغض النظر عن مستواه الاقتصادي، يستحق أن يعيش ويعمل في بيئة تدعمه وترفعه وتساعده على أداء دوره في الحياة على أكمل وجه."></p><p data-en="What brought us together was not just complementary expertise, but genuine trust in each other's abilities and a shared passion for this field. M. Elgamal designs and develops the creative vision. M. Marzouk ensures structural precision and rigorous on-site execution. Our CFO manages every project with financial discipline earned through extensive experience in major project environments in Saudi Arabia." data-ar="ما جمعنا لم يكن مجرد تخصصات متكاملة، بل ثقة حقيقية في قدرات بعضنا وشغف مشترك بهذا المجال. م. الجمال يصمم ويطور الرؤية الإبداعية. م. مرزوق يضمن الدقة الإنشائية والتنفيذ المحكم على أرض الواقع. المدير المالي يدير كل مشروع بانضباط مالي مكتسب من خبرة واسعة في بيئة المشاريع الكبرى بالمملكة العربية السعودية."></p><p data-en="Together, we build spaces that are honest, functional, and crafted with care — for every client, at every budget." data-ar="معاً، نبني فراغات صادقة وعملية ومصنوعة بعناية — لكل عميل، وفي كل ميزانية."></p></div></section><section class="section alt"><div class="section-head reveal"><h2 data-en="The Team" data-ar="الفريق"></h2></div><div class="grid cols-3"><article class="team-card reveal"><img src="Members/Founder & CEO Mohamed Elgmal.png" alt="Mohamed Elgamal"><h3 data-en="Mohamed Elgamal" data-ar="محمد الجمال"></h3><p data-en="Founder & Creative Director" data-ar="المؤسس والمدير الإبداعي"></p><p data-en="Architect and interior designer. Leads all design work, creative vision, and client relationships from concept through execution." data-ar="مهندس معماري ومصمم داخلي. يقود جميع أعمال التصميم والرؤية الإبداعية وعلاقات العملاء من المفهوم حتى التنفيذ."></p></article><article class="team-card reveal"><img src="Members/Site Managers Abdelrahman Marzouk.png" alt="Abdelrahman Marzouk"><h3 data-en="Abdelrahman Marzouk" data-ar="عبدالرحمن مرزوق"></h3><p data-en="Site Manager" data-ar="مدير المواقع"></p><p data-en="Civil engineer responsible for on-site execution, structural oversight, and contractor coordination across all projects." data-ar="مهندس مدني مسؤول عن التنفيذ الميداني والإشراف الإنشائي وتنسيق المقاولين في جميع المشاريع."></p></article><article class="team-card reveal"><img src="Members/CFO Mohamed Elbada.png" alt="Mohamed El-Diba"><h3 data-en="Mohamed El-Diba" data-ar="محمد الديبه"></h3><p data-en="Chief Financial Officer" data-ar="المدير المالي"></p><p data-en="Brings financial precision and project management discipline from extensive experience in major construction projects in Saudi Arabia." data-ar="يُدخل الدقة المالية وانضباط إدارة المشاريع المكتسبين من خبرة واسعة في مشاريع الإنشاءات الكبرى بالمملكة العربية السعودية."></p></article></div></section><section class="section"><div class="grid cols-3"><article class="value-card reveal"><h3 data-en="Quality in Every Detail" data-ar="الجودة في كل تفصيلة"></h3><p data-en="Precise decisions in materials, drawings, and execution." data-ar="قرارات دقيقة في المواد والرسومات والتنفيذ."></p></article><article class="value-card reveal"><h3 data-en="Design for Every Budget" data-ar="تصميم لكل ميزانية"></h3><p data-en="Refined spaces shaped around real constraints." data-ar="فراغات راقية مصممة حول القيود الواقعية."></p></article><article class="value-card reveal"><h3 data-en="Honest Execution" data-ar="تنفيذ أمين"></h3><p data-en="Clear supervision from site start to final handover." data-ar="إشراف واضح من بداية الموقع حتى التسليم النهائي."></p></article></div></section></main>
